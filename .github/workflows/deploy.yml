name: Deploy to GitHub Pages

on:
  # Деплой при каждом пуше в main
  push:
    branches: [main]
  # И возможность запустить вручную из вкладки Actions
  workflow_dispatch:

# Права, нужные для публикации на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно — только один деплой; новый пуш отменяет предыдущий прогон
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Гейт качества: типы, линт, формат и защита от регрессий. Блокирует деплой.
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck (astro check)
        run: npm run check
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Guard — контейнер только через токен --content-max
        run: |
          if grep -rn 'max-w-\[1680px\]' src; then
            echo "::error::Хардкод max-w-[1680px]. Используйте токен: max-w-[var(--content-max)] или <Container>."
            exit 1
          fi

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # path по умолчанию ".", node-version по умолчанию свежий LTS

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
